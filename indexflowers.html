<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICK ME</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fdf5e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            text-align: center;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ffb6c1;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
            margin-bottom: 40px;
        }

        button:hover {
            background-color: #ff69b4;
            color: white;
        }

        .garden {
            display: flex;
            gap: 20px;
            min-height: 150px;
        }

        .flower {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0) translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .bloom .flower {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .flower:nth-child(1) { transition-delay: 0.00s; }
        .flower:nth-child(2) { transition-delay: 0.15s; }
        .flower:nth-child(3) { transition-delay: 0.30s; }
        .flower:nth-child(4) { transition-delay: 0.45s; }
        .flower:nth-child(5) { transition-delay: 0.60s; }
        .flower:nth-child(6) { transition-delay: 0.75s; }
        .flower:nth-child(7) { transition-delay: 0.90s; }
        .flower:nth-child(8) { transition-delay: 1.05s; }
        .flower:nth-child(9) { transition-delay: 1.20s; }

        @media (max-width: 800px) {
            .garden {
                flex-wrap: wrap;
                justify-content: center;
            }
            .flower {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

    <button id="bloomBtn">CLICK MEE</button>

    <div class="garden" id="garden">
        <img class="flower" src="https://i.pinimg.com/webp85/1200x/03/b9/9b/03b99bc099325d55ec7101c5fbf32885.webp" alt="Lily">
        <img class="flower" src="https://i.pinimg.com/736x/91/09/28/9109286a4ca23a69eb49ecae4485fd5a.jpg" alt="Pink Rose">
        <img class="flower" src="https://i.pinimg.com/736x/ed/7d/12/ed7d12f2521ad690d48af002b47c8b9a.jpg" alt="Lily">
        <img class="flower" src="https://i.pinimg.com/webp85/736x/a9/ef/12/a9ef128e18e60b3c49825c2ef09a0198.webp" alt="Pink Rose">
        <img class="flower" src="https://i.pinimg.com/736x/5d/c9/9d/5dc99dba4b2a80351ba1c29010eee7b4.jpg" alt="Lily">
        <img class="flower" src="https://cdn.discordapp.com/attachments/1511188255293313024/1511201555876020385/IMG_1592.JPG?ex=6a1f979f&is=6a1e461f&hm=15f2e9ea425a03ca38aff69e4d3fe61ae34fafedb481feec3c723c0b194660a2&" alt="Lily">
        <img class="flower" src="https://cdn.discordapp.com/attachments/1511188255293313024/1511201556236734504/IMG_1598.JPG?ex=6a1f979f&is=6a1e461f&hm=61fa4077d86c449bea1ecf5e6d3b9c0162e7b166b3a2ca3efa06a5bd0c3b786f&" alt="Lily">
        <img class="flower" src="https://cdn.discordapp.com/attachments/1511188255293313024/1511201555569709066/E1811721-4FAF-4023-8581-75F018EE3A43.JPG?ex=6a1f979f&is=6a1e461f&hm=a5da23fe2ef99c72417964db0e80bd7f59d386b37767ee4741fae154b6c7f3a5&" alt="Lily">
        <img class="flower" src="https://cdn.discordapp.com/attachments/1511188255293313024/1511201555263655996/6ADBD467-6708-4DCA-AFF7-6650C1F84F40.JPG?ex=6a1f979f&is=6a1e461f&hm=c14f6de8e423425748a490413bd70910ba91f1913bb6fa1d197d2e7c7d765b04&" alt="Lily">
    </div>

    <script>
        const btn = document.getElementById('bloomBtn');
        const garden = document.getElementById('garden');

        btn.addEventListener('click', () => {
            garden.classList.toggle('bloom');
            btn.textContent = garden.classList.contains('bloom') ? 'Hide Garden' : 'CLICK MEE';
        });
    </script>

</body>
</html>
