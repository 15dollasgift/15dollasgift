<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICK ME</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: url('https://i.pinimg.com/736x/f9/9f/a4/f99fa43713e3028b769a76af98147629.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            text-align: center;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #ffb6c1;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
            margin-bottom: 40px;
        }

        button:hover {
            background-color: #ff69b4;
            color: white;
        }

        .garden {
            display: flex;
            gap: 20px;
            min-height: 150px;
        }

        .flower {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0) translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .bloom .flower {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .flower:nth-child(1)  { transition-delay: 0.00s; }
        .flower:nth-child(2)  { transition-delay: 0.15s; }
        .flower:nth-child(3)  { transition-delay: 0.30s; }
        .flower:nth-child(4)  { transition-delay: 0.45s; }
        .flower:nth-child(5)  { transition-delay: 0.60s; }
        .flower:nth-child(6)  { transition-delay: 0.75s; }
        .flower:nth-child(7)  { transition-delay: 0.90s; }
        .flower:nth-child(8)  { transition-delay: 1.05s; }
        .flower:nth-child(9)  { transition-delay: 1.20s; }
        .flower:nth-child(10) { transition-delay: 1.35s; }

        /* Quote styling */
        #quote {
            margin-top: 36px;
            font-size: 1.4rem;
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.45);
            letter-spacing: 0.04em;
            min-height: 2em;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #quote.visible {
            opacity: 1;
        }

        .letter {
            display: inline;
            opacity: 0;
            transition: opacity 0.08s ease;
        }

        .letter.show {
            opacity: 1;
        }

        @media (max-width: 800px) {
            .garden {
                flex-wrap: wrap;
                justify-content: center;
            }
            .flower {
                width: 100px;
                height: 100px;
            }
            #quote {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <button id="bloomBtn">CLICK MEE</button>

    <div class="garden" id="garden">
        <img class="flower" src="https://i.pinimg.com/webp85/1200x/03/b9/9b/03b99bc099325d55ec7101c5fbf32885.webp" alt="Lily">
        <img class="flower" src="https://i.pinimg.com/736x/91/09/28/9109286a4ca23a69eb49ecae4485fd5a.jpg" alt="Pink Rose">
        <img class="flower" src="https://i.pinimg.com/736x/ed/7d/12/ed7d12f2521ad690d48af002b47c8b9a.jpg" alt="Lily">
        <img class="flower" src="https://i.pinimg.com/webp85/736x/a9/ef/12/a9ef128e18e60b3c49825c2ef09a0198.webp" alt="Pink Rose">
        <img class="flower" src="https://i.pinimg.com/736x/5d/c9/9d/5dc99dba4b2a80351ba1c29010eee7b4.jpg" alt="Lily">
        <img class="flower" src="images/flowers.png" alt="Lily">
        <img class="flower" src="images/floor.png" alt="Lily">
        <img class="flower" src="images/kid.png" alt="Lily">
        <img class="flower" src="images/kid2.png" alt="Lily">
        <img class="flower" src="images/cutie.png" alt="Lily">
    </div>

    <div id="quote"></div>

    <script>
        const btn = document.getElementById('bloomBtn');
        const garden = document.getElementById('garden');
        const quoteEl = document.getElementById('quote');
        const quoteText = "in a world full of roses, you will be my lily";

        let typeTimeout = null;

        function typeLetters() {
            // Build spans for each character
            quoteEl.innerHTML = '';
            quoteEl.classList.add('visible');

            const spans = [];
            for (let i = 0; i < quoteText.length; i++) {
                const span = document.createElement('span');
                span.classList.add('letter');
                span.textContent = quoteText[i] === ' ' ? '\u00A0' : quoteText[i];
                quoteEl.appendChild(span);
                spans.push(span);
            }

            // Stagger each letter appearing — start after last flower blooms (~1.9s)
            spans.forEach((span, i) => {
                setTimeout(() => span.classList.add('show'), 1900 + i * 55);
            });
        }

        function hideQuote() {
            quoteEl.classList.remove('visible');
            quoteEl.innerHTML = '';
            if (typeTimeout) clearTimeout(typeTimeout);
        }

        btn.addEventListener('click', () => {
            garden.classList.toggle('bloom');

            if (garden.classList.contains('bloom')) {
                btn.textContent = 'Hide Garden';
                typeLetters();
            } else {
                btn.textContent = 'CLICK MEE';
                hideQuote();
            }
        });
    </script>

</body>
</html>
